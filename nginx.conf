server {
	server_name www.api.horse;
	listen 80;

	return 301 $scheme://api.horse$request_uri;
}

server {
	server_name api.horse;
	listen 80;

	root /var/www/api.horse/www;

	index index.html;
	client_max_body_size 10m;

	add_header X-Content-Type-Options nosniff always;
	add_header Referrer-Policy strict-origin-when-cross-origin always;
	add_header X-Frame-Options SAMEORIGIN always;

	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_types
		application/javascript
		application/json
		application/manifest+json
		application/xml
		image/svg+xml
		text/css
		text/plain
		text/xml;

	location / {
		try_files $uri @gt;
	}

	location ~* \.(?:css|js|mjs|map|json|webmanifest|xml|txt|avif|gif|ico|jpe?g|png|svg|webp|woff2?|ttf|otf)$ {
		expires 1h;
	}

	location ~ /\. {
		deny all;
	}

	location @gt {
		include fastcgi_params;

		fastcgi_pass unix:/var/run/php/php8.5-fpm.sock;
		fastcgi_param DOCUMENT_ROOT $realpath_root;
		fastcgi_param SERVER_NAME $host;
		fastcgi_param REQUEST_URI $request_uri;
		fastcgi_param SCRIPT_FILENAME /var/www/api.horse/vendor/phpgt/webengine/go.php;
	}
}
