<header>
	<h1>
		<a href="/">
			<span class="subdomain"></span>
			<span class="domain">api.horse</span>
			<span class="path"></span>
		</a>
		<button
			type="button"
			class="theme-toggle"
			data-theme-toggle
			data-theme-mode="system"
			aria-label="Colour scheme: System"
			title="Colour scheme: System"
		>
			<span class="theme-toggle-icon theme-toggle-icon-system" aria-hidden="true"></span>
			<span class="theme-toggle-icon theme-toggle-icon-light" aria-hidden="true"></span>
			<span class="theme-toggle-icon theme-toggle-icon-dark" aria-hidden="true"></span>
		</button>
	</h1>

	<menu>
		<li>
			<a href="/request/{{shareId}}/">Request</a>
		</li>
		<li>
			<a href="/webhook/{{shareId}}/">Webhook</a>
		</li>
		<li>
			<a href="/gateway/{{shareId}}/">Gateway</a>
		</li>
		<li>
			<a href="/sponsor/">Sponsor</a>
		</li>
		<li>
			<a href="https://github.com/g105b/api.horse" target="_blank">GitHub</a>
		</li>
	</menu>
</header>

<dialog id="sharedReadOnlyDialog" data-flux="update-outer" data-dialog="auto-modal">
	<form method="dialog">
		<h1>Read-only shared link</h1>
		<p>You're trying to make changes to a collection you don't own.</p>
		<p>You were shared this link as a read-only view into someone else's API collection.</p>
		<p>To make changes, you must fork it first.</p>
		<div class="actions important">
			<button class="positive" autofocus>OK</button>
		</div>
	</form>
</dialog>
